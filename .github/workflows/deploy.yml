name: Deploy to VPS

on:
  push:
    branches:
      - main  # убедись, что твоя ветка называется именно main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/schedule-app
            git pull origin main
            npm install
            pm2 restart wu-schedule