<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">

  <!-- SEO -->
  <title>WU Plan — Collegium Da Vinci</title>
  <meta name="description" content="Minimalistyczna aplikacja do przeglądania planu zajęć Collegium Da Vinci (Wirtualna Uczelnia)">

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WU Plan">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>

  <!-- ═══════════════ ONBOARDING SCREEN ═══════════════ -->
  <div class="screen hidden" id="onboarding-screen">
    <div class="ob-slides">

      <!-- Slide 1: Calendar -->
      <div class="ob-slide active" id="ob-slide-0">
        <div class="ob-illustration">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="ob-pulse">
            <rect x="10" y="18" width="80" height="72" rx="10" stroke="white" stroke-width="2"/>
            <line x1="10" y1="37" x2="90" y2="37" stroke="white" stroke-width="2"/>
            <line x1="32" y1="8" x2="32" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="68" y1="8" x2="68" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <circle cx="33" cy="54" r="3" fill="white"/>
            <circle cx="50" cy="54" r="3" fill="white"/>
            <circle cx="67" cy="54" r="3" fill="white"/>
            <circle cx="33" cy="70" r="3" fill="white"/>
            <circle cx="50" cy="70" r="3" fill="white"/>
            <circle cx="67" cy="70" r="3" fill="rgba(255,255,255,0.25)"/>
          </svg>
        </div>
        <div class="ob-title" id="ob-title-0"></div>
        <div class="ob-subtitle" id="ob-sub-0"></div>
      </div>

      <!-- Slide 2: Share icon -->
      <div class="ob-slide" id="ob-slide-1">
        <div class="ob-illustration">
          <svg viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg" class="ob-float">
            <rect x="22" y="32" width="56" height="68" rx="8" stroke="white" stroke-width="2"/>
            <line x1="50" y1="6" x2="50" y2="55" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <polyline points="36,20 50,6 64,20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="35" y1="58" x2="65" y2="58" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
            <line x1="35" y1="70" x2="58" y2="70" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
            <line x1="35" y1="82" x2="52" y2="82" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
          </svg>
        </div>
        <div class="ob-title" id="ob-title-1"></div>
        <div class="ob-subtitle" id="ob-sub-1"></div>
      </div>

      <!-- Slide 3: iPhone + landing icon -->
      <div class="ob-slide" id="ob-slide-2">
        <div class="ob-illustration">
          <svg viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="18" y="5" width="64" height="120" rx="14" stroke="white" stroke-width="2"/>
            <line x1="18" y1="22" x2="82" y2="22" stroke="white" stroke-width="1" opacity="0.25"/>
            <line x1="18" y1="108" x2="82" y2="108" stroke="white" stroke-width="1" opacity="0.25"/>
            <rect x="35" y="9" width="30" height="8" rx="4" stroke="white" stroke-width="1" opacity="0.5"/>
            <rect x="38" y="114" width="24" height="4" rx="2" fill="white" opacity="0.3"/>
            <g class="ob-drop">
              <rect x="33" y="52" width="34" height="34" rx="9" stroke="white" stroke-width="2"/>
              <line x1="43" y1="67" x2="57" y2="67" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <line x1="50" y1="60" x2="50" y2="74" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </g>
          </svg>
        </div>
        <div class="ob-title" id="ob-title-2"></div>
        <div class="ob-subtitle" id="ob-sub-2"></div>
      </div>

    </div><!-- .ob-slides -->

    <!-- Controls -->
    <div class="ob-controls">
      <button class="ob-btn-start" id="ob-btn-start"></button>
      <div class="ob-btn-row" id="ob-btn-row">
        <button class="ob-btn-skip" id="ob-btn-skip">Pomiń</button>
        <div class="ob-dots">
          <div class="ob-dot active"></div>
          <div class="ob-dot"></div>
          <div class="ob-dot"></div>
        </div>
        <button class="ob-btn-next" id="ob-btn-next">Dalej</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ LOGIN SCREEN ═══════════════ -->

  <div class="screen" id="login-screen">
    <div class="login-brand"><span>WU</span> · CDV</div>
    <h1 class="login-title" data-i18n="loginTitle">Wirtualna Uczelnia</h1>
    <p class="login-subtitle" data-i18n="loginSubtitle">Zaloguj się aby zobaczyć plan zajęć</p>

    <div class="field">
      <label class="field-label" for="inp-login" data-i18n="loginLabel">Login (e-mail)</label>
      <input class="field-input" type="email" id="inp-login" autocomplete="email" inputmode="email" placeholder="imie@edu.cdv.pl">
    </div>
    <div class="field">
      <label class="field-label" for="inp-pass" data-i18n="passLabel">Hasło</label>
      <input class="field-input" type="password" id="inp-pass" autocomplete="current-password" placeholder="••••••••">
    </div>

    <button class="btn-primary" id="btn-login" data-i18n="loginBtn">Zaloguj się</button>
    <div class="login-error" id="login-error" aria-live="polite"></div>
  </div>

  <!-- ═══════════════ APP SCREEN ═══════════════ -->
  <div class="screen hidden" id="app-screen">

    <!-- Header -->
    <header class="app-header">
      <div class="header-row">
        <div class="header-brand"><span>WU</span> · <span data-i18n="headerSchedule">Plan zajęć</span></div>
        <div class="header-actions">
          <div class="relative">
            <button class="icon-btn" id="btn-lang" aria-label="Change language">
              <i data-lucide="globe" stroke-width="1.2"></i>
            </button>
            <div class="lang-dropdown" id="lang-dropdown">
              <button class="lang-option" data-lang="pl">Polski</button>
              <button class="lang-option" data-lang="ru">Русский</button>
              <button class="lang-option" data-lang="en">English</button>
            </div>
          </div>
          <a class="icon-btn feedback-icon" href="https://t.me/krtlnk" target="_blank" rel="noopener" aria-label="Feedback">
            <i data-lucide="send" stroke-width="1.2"></i>
          </a>
          <button class="icon-btn" id="btn-theme" aria-label="Toggle theme">
            <i data-lucide="sun" stroke-width="1.2"></i>
          </button>
          <button class="icon-btn" id="btn-logout" aria-label="Logout">
            <i data-lucide="log-out" stroke-width="1.2"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Offline banner -->
    <div class="offline-banner" id="offline-banner" style="display:none">
      <i data-lucide="wifi-off" stroke-width="1.2"></i>
      <span id="offline-text"></span>
    </div>

    <!-- Day heading -->
    <section class="day-heading" id="day-heading">
      <div class="day-heading-main" id="day-heading-main"></div>
      <div class="day-heading-sub" id="day-heading-sub"></div>
    </section>

    <!-- Week navigation -->
    <nav class="week-nav">
      <button class="week-arrow" id="btn-prev" aria-label="Previous week">
        <i data-lucide="chevron-left" stroke-width="1.2"></i>
      </button>
      <span class="week-label" id="week-label"></span>
      <span class="today-indicator" id="today-indicator" style="display:none"></span>
      <button class="week-arrow" id="btn-next" aria-label="Next week">
        <i data-lucide="chevron-right" stroke-width="1.2"></i>
      </button>
    </nav>

    <!-- Day tabs -->
    <nav class="day-tabs" id="day-tabs"></nav>

    <!-- Separator -->
    <div class="separator"></div>

    <!-- Schedule list -->
    <main class="schedule-list" id="schedule-list"></main>
  </div>

  <!-- ═══════════════ BOTTOM SHEET ═══════════════ -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet" id="detail-sheet">
    <div class="sheet-handle" id="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheet-title"></div>
      <div class="sheet-subtitle" id="sheet-subtitle"></div>
    </div>
    <div id="sheet-body"></div>
  </div>

  <!-- ═══════════════ iOS BANNER ═══════════════ -->
  <div class="ios-banner" id="ios-banner" style="display:none">
    <span class="ios-banner-icon">
      <i data-lucide="share" stroke-width="1.2"></i>
    </span>
    <div data-i18n-html="iosBanner">Dodaj do ekranu głównego: <strong>Udostępnij → Ekran główny</strong></div>
    <button class="ios-close" id="ios-close" aria-label="Close">
      <i data-lucide="x" stroke-width="1.2"></i>
    </button>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
</body>

</html>
