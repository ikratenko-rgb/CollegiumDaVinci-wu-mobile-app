<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f13">

  <!-- PWA / iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WU Plan">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">

  <title>WU Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f13;
      --bg2: #17171d;
      --bg3: #1e1e27;
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --text: #f0f0f5;
      --muted: #7a7a8c;
      --accent: #7c6aff;
      --accent2: #a594ff;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      transition: opacity 0.3s, transform 0.3s;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
    }

    /* ── LOGIN ── */
    #login-screen {
      align-items: center;
      justify-content: center;
      padding: 32px 28px;
      background: var(--bg);
    }

    .login-logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .login-logo span {
      color: var(--accent2);
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .field {
      width: 100%;
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
      -webkit-appearance: none;
    }

    .btn-primary:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.4;
    }

    .login-error {
      margin-top: 14px;
      font-size: 13px;
      color: #ff6b6b;
      text-align: center;
      min-height: 20px;
    }

    /* ── MAIN APP ── */
    #app-screen {
      background: var(--bg);
    }

    /* header */
    .app-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .header-logo {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .header-logo span {
      color: var(--accent2);
    }

    .logout-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      cursor: pointer;
    }

    /* week nav */
    .week-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .week-arrow {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-appearance: none;
    }

    .week-label {
      flex: 1;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
    }

    .today-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* day tabs */
    .day-tabs {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      overflow-x: auto;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .day-tabs::-webkit-scrollbar {
      display: none;
    }

    .day-tab {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 14px;
      border-radius: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
      min-width: 52px;
    }

    .day-tab.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .day-tab.today:not(.active) {
      border-color: var(--accent);
    }

    .day-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .day-tab.active .day-name {
      color: rgba(255, 255, 255, 0.7);
    }

    .day-num {
      font-size: 16px;
      font-weight: 700;
      margin-top: 2px;
    }

    /* schedule list */
    .schedule-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      -webkit-overflow-scrolling: touch;
    }

    .class-card {
      display: flex;
      gap: 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }

    .class-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }

    .class-card:active {
      background: var(--bg3);
    }

    .time-col {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      min-width: 44px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .time-start {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .time-end {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .vline {
      width: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    .class-body {
      flex: 1;
      min-width: 0;
    }

    .class-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .class-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .pill {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      white-space: nowrap;
    }

    .pill.form {
      background: rgba(124, 106, 255, 0.1);
      border-color: rgba(124, 106, 255, 0.3);
      color: var(--accent2);
    }

    .empty-day {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .empty-day .icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 15, 19, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: 14px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── DETAIL SHEET ── */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .sheet-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg2);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border2);
      padding: 0 20px calc(20px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 51;
      max-height: 80vh;
      overflow-y: auto;
    }

    .sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin: 12px auto 20px;
    }

    .sheet-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .detail-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .detail-value {
      font-size: 14px;
      font-weight: 500;
    }

    /* ── ADD TO HOME BANNER (Safari) ── */
    .ios-banner {
      position: fixed;
      bottom: calc(16px + var(--safe-bottom));
      left: 16px;
      right: 16px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      font-size: 13px;
      color: var(--muted);
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
    }

    .ios-banner strong {
      color: var(--text);
    }

    .ios-close {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }

    .ios-share-icon {
      color: var(--accent2);
      font-size: 20px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div class="screen" id="login-screen">
    <div class="login-logo"><span>WU</span> · CDV</div>
    <div class="login-title">Wirtualna Uczelnia</div>
    <div class="login-sub">Zaloguj się aby zobaczyć plan zajęć</div>
    <div class="field">
      <label>Login (e-mail)</label>
      <input type="email" id="inp-login" autocomplete="email" inputmode="email" placeholder="imie@edu.cdv.pl">
    </div>
    <div class="field">
      <label>Hasło</label>
      <input type="password" id="inp-pass" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="btn-login">Zaloguj się</button>
    <div class="login-error" id="login-error"></div>
  </div>

  <!-- APP -->
  <div class="screen hidden" id="app-screen">
    <div class="app-header">
      <div class="header-top">
        <div class="header-logo"><span>WU</span> · Plan zajec</div>
        <button class="logout-btn" id="btn-logout">Wyloguj</button>
      </div>
      <div class="week-nav">
        <button class="week-arrow" id="btn-prev">‹</button>
        <div class="week-label" id="week-label"></div>
        <div class="today-dot" id="today-dot" style="display:none"></div>
        <button class="week-arrow" id="btn-next">›</button>
      </div>
    </div>
    <div class="day-tabs" id="day-tabs"></div>
    <div class="schedule-list" id="schedule-list"></div>
  </div>

  <!-- DETAIL SHEET -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet" id="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title"></div>
    <div id="sheet-body"></div>
  </div>

  <!-- iOS Add to Home banner -->
  <div class="ios-banner" id="ios-banner" style="display:none">
    <span class="ios-share-icon">⎋</span>
    <div>Dodaj do ekranu głównego: <strong>Udostępnij → Dodaj do ekranu głównego</strong></div>
    <button class="ios-close" id="ios-close">×</button>
  </div>

  <script src="/app.js"></script>
</body>

</html>
