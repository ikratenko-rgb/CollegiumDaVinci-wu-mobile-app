<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">

  <title>WU Plan — Collegium Da Vinci</title>
  <meta name="description"
    content="Minimalistyczna aplikacja do przeglądania planu zajęć Collegium Da Vinci (Wirtualna Uczelnia)">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WU Plan">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=2">
  <link rel="manifest" href="/manifest.json">

  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>

  <div class="screen hidden" id="onboarding-screen">
    <div class="ob-slides">

      <div class="ob-slide active" id="ob-slide-0">
        <div class="ob-illustration">
          <img src="/assets/svg/onboarding-calendar.svg" alt="" class="ob-pulse">
        </div>
        <div class="ob-title" id="ob-title-0"></div>
        <div class="ob-subtitle" id="ob-sub-0"></div>
      </div>

      <div class="ob-slide" id="ob-slide-1">
        <div class="ob-illustration">
          <img src="/assets/svg/onboarding-upload.svg" alt="" class="ob-float">
        </div>
        <div class="ob-title" id="ob-title-1"></div>
        <div class="ob-subtitle" id="ob-sub-1"></div>
      </div>

      <div class="ob-slide" id="ob-slide-2">
        <div class="ob-illustration">
          <img src="/assets/svg/onboarding-mobile-add.svg" alt="">
        </div>
        <div class="ob-title" id="ob-title-2"></div>
        <div class="ob-subtitle" id="ob-sub-2"></div>
      </div>

    </div>

    <div class="ob-controls">
      <button class="ob-btn-start" id="ob-btn-start"></button>
      <div class="ob-btn-row" id="ob-btn-row">
        <button class="ob-btn-skip" id="ob-btn-skip">Pomiń</button>
        <div class="ob-dots">
          <div class="ob-dot active"></div>
          <div class="ob-dot"></div>
          <div class="ob-dot"></div>
        </div>
        <button class="ob-btn-next" id="ob-btn-next">Dalej</button>
      </div>
    </div>
  </div>

  <div class="screen hidden" id="login-screen">
    <div class="login-brand"><span>WU</span> · CDV</div>
    <h1 class="login-title" data-i18n="loginTitle">Wirtualna Uczelnia</h1>
    <p class="login-subtitle" data-i18n="loginSubtitle">Zaloguj się aby zobaczyć plan zajęć</p>

    <div class="field">
      <label class="field-label" for="inp-login" data-i18n="loginLabel">Login (e-mail)</label>
      <input class="field-input" type="email" id="inp-login" autocomplete="email" inputmode="email"
        placeholder="imie@edu.cdv.pl">
    </div>
    <div class="field">
      <label class="field-label" for="inp-pass" data-i18n="passLabel">Hasło</label>
      <input class="field-input" type="password" id="inp-pass" autocomplete="current-password" placeholder="••••••••">
    </div>

    <button class="btn-primary" id="btn-login" data-i18n="loginBtn">Zaloguj się</button>
    <div class="login-error" id="login-error" aria-live="polite"></div>
  </div>

  <div class="screen hidden" id="app-screen">

    <header class="app-header">
      <div class="header-row">
        <div class="header-brand"><span>WU</span> · <span data-i18n="headerSchedule">Plan zajęć</span></div>
        <div class="header-actions">
          <div class="relative">
            <button class="icon-btn" id="btn-lang" aria-label="Change language">
              <i data-lucide="globe" stroke-width="1.2"></i>
            </button>
            <div class="lang-dropdown" id="lang-dropdown">
              <button class="lang-option" data-lang="pl">Polski</button>
              <button class="lang-option" data-lang="ru">Русский</button>
              <button class="lang-option" data-lang="en">English</button>
            </div>
          </div>

          <button class="icon-btn" id="btn-theme" aria-label="Toggle theme">
            <i data-lucide="sun" stroke-width="1.2"></i>
          </button>
          <button class="icon-btn" id="btn-logout" aria-label="Logout">
            <i data-lucide="log-out" stroke-width="1.2"></i>
          </button>
        </div>
      </div>
    </header>

    <div class="offline-banner" id="offline-banner" style="display:none">
      <i data-lucide="wifi-off" stroke-width="1.2"></i>
      <span id="offline-text"></span>
    </div>

    <section class="day-heading" id="day-heading">
      <div class="day-heading-main" id="day-heading-main"></div>
      <div class="day-heading-sub" id="day-heading-sub"></div>
    </section>

    
    <nav class="week-nav">
      <button class="week-arrow" id="btn-prev" aria-label="Previous week">
        <i data-lucide="chevron-left" stroke-width="1.2"></i>
      </button>
      <span class="week-label" id="week-label"></span>
      <button class="week-arrow" id="btn-next" aria-label="Next week">
        <i data-lucide="chevron-right" stroke-width="1.2"></i>
      </button>
    </nav>

    <nav class="day-tabs" id="day-tabs"></nav>

    <div class="separator"></div>

    <main class="schedule-list" id="schedule-list"></main>
  </div>

  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet" id="detail-sheet">
    <div class="sheet-handle" id="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheet-title"></div>
      <div class="sheet-subtitle" id="sheet-subtitle"></div>
    </div>
    <div id="sheet-body"></div>
  </div>

  <div class="ios-banner" id="ios-banner" style="display:none">
    <span class="ios-banner-icon">
      <i data-lucide="share" stroke-width="1.2"></i>
    </span>
    <div data-i18n-html="iosBanner">Dodaj do ekranu głównego: <strong>Udostępnij → Ekran główny</strong></div>
    <button class="ios-close" id="ios-close" aria-label="Close">
      <i data-lucide="x" stroke-width="1.2"></i>
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <footer class="app-footer">
    <div style="flex:1"></div>
    <a href="https://t.me/krtlnk" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
      <span data-i18n="feedbackText">Нашёл баг? Напиши мне</span>
    </a>
    <div style="flex:1;display:flex;justify-content:flex-end">
      <span id="app-version" class="app-version"></span>
    </div>
  </footer>

  <script type="module" src="/js/app.js"></script>
</body>

</html>
